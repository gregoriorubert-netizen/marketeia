<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=block" rel="stylesheet">
<style>
  :root{
    --bg:#F4F1E8; --surface:#ECE7DA; --petrol:#122B2D; --primary:#D03A1B; --secondary:#1E6B63;
    --ink-dim:rgba(18,43,45,.72); --ink-faint:rgba(18,43,45,.42);
    --fd:'Archivo',sans-serif; --fu:'Inter Tight',sans-serif; --fm:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#000;}
  .post{position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--bg);color:var(--petrol);font-family:var(--fu);padding:64px 76px 56px;display:flex;flex-direction:column;}
  .blob{position:absolute;width:760px;height:760px;border-radius:50%;right:-220px;top:-260px;background:radial-gradient(circle, rgba(208,58,27,.16) 0%, rgba(208,58,27,0) 65%);pointer-events:none;}
  .top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2;}
  .eyebrow{font-family:var(--fm);font-size:15px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);display:flex;align-items:center;gap:12px;}
  .eyebrow .dot{width:9px;height:9px;border-radius:50%;background:var(--primary);}
  .handle{font-family:var(--fm);font-size:14px;letter-spacing:.16em;color:var(--ink-faint);}
  .mid{margin-top:96px;position:relative;z-index:2;}
  h1{font-family:var(--fd);font-weight:800;font-size:94px;line-height:.96;letter-spacing:-.02em;text-transform:uppercase;}
  h1 .accent{color:var(--primary);}
  /* flatline = sinal morto = sem resultado */
  .flat{width:100%;height:90px;margin-top:54px;}
  .flat polyline{fill:none;stroke:var(--primary);stroke-width:7;stroke-linejoin:round;stroke-linecap:round;}
  .flat .ghost{stroke:rgba(18,43,45,.14);stroke-width:5;}
  .sub{font-family:var(--fu);font-weight:400;font-size:26px;line-height:1.5;color:var(--ink-dim);margin-top:46px;max-width:780px;}
  .spacer{flex:1 1 auto;}
  .cta{align-self:flex-start;margin-top:40px;font-family:var(--fm);font-size:17px;letter-spacing:.1em;text-transform:uppercase;color:#FFF7EF;background:var(--primary);padding:21px 34px;border-radius:8px;display:inline-flex;gap:14px;align-items:center;}
  .foot{display:flex;justify-content:space-between;align-items:flex-end;position:relative;z-index:2;padding-top:26px;border-top:1px solid rgba(18,43,45,.12);margin-top:40px;}
  .wordmark{font-family:var(--fd);font-weight:800;font-size:31px;letter-spacing:-.01em;}
  .wordmark .ia{color:var(--primary);}
  .tagline{font-family:var(--fm);font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);}
</style></head>
<body>
  <div class="post">
    <div class="blob"></div>
    <div class="top"><div class="eyebrow"><span class="dot"></span>Tráfego pago • Diagnóstico</div><div class="handle">@marketeia</div></div>
    <div class="mid">
      <h1>Tráfego pago deixa o seu negócio <span class="accent">sem resultado?</span></h1>
      <svg class="flat" viewBox="0 0 928 90" preserveAspectRatio="none">
        <polyline class="ghost" points="0,52 360,52 392,20 420,80 452,28 486,52 928,52"/>
        <polyline points="0,70 250,70 270,68 300,72 330,70 928,70"/>
      </svg>
      <p class="sub">Tráfego sem estratégia gasta verba e não vira venda. Entenda o porquê e receba um plano pra inverter isso.</p>
    </div>
    <div class="spacer"></div>
    <div class="cta">Material gratuito&nbsp;&nbsp;→&nbsp;&nbsp;link na bio</div>
    <div class="foot"><div class="wordmark">markete<span class="ia">ia</span></div><div class="tagline">Sinal vs ruído</div></div>
  </div>
</body></html>
