<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Arial&display=block" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#fff;}
  .win{width:934px;height:496px;background:#fff;overflow:hidden;font-family:Arial,sans-serif;display:flex;flex-direction:column;}
  .chrome{height:58px;background:#f1f3f4;display:flex;align-items:center;padding:0 22px;gap:18px;border-bottom:1px solid #e4e6e8;}
  .dots{display:flex;gap:9px;}
  .dot{width:13px;height:13px;border-radius:50%;}
  .addr{flex:1;height:34px;background:#fff;border-radius:17px;display:flex;align-items:center;gap:10px;padding:0 18px;color:#5f6368;font-size:15px;border:1px solid #e4e6e8;max-width:560px;margin:0 auto;}
  .addr .lock{width:13px;height:13px;}
  .page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;padding-bottom:18px;}
  .logo{font-family:'Poppins',sans-serif;font-weight:500;font-size:74px;letter-spacing:-3px;line-height:1;}
  .logo .b{color:#4285F4;} .logo .r{color:#EA4335;} .logo .y{color:#FBBC05;} .logo .g{color:#34A853;}
  .bar{width:600px;height:52px;border:1px solid #dfe1e5;border-radius:26px;display:flex;align-items:center;padding:0 20px;gap:15px;box-shadow:0 1px 6px rgba(32,33,36,.10);}
  .bar .q{flex:1;color:#3c4043;font-size:19px;}
  .bar svg{flex:0 0 auto;}
  .btns{display:flex;gap:12px;}
  .btn{background:#f8f9fa;border:1px solid #f8f9fa;color:#3c4043;font-size:14px;padding:10px 18px;border-radius:4px;}
</style></head>
<body>
  <div class="win">
    <div class="chrome">
      <div class="dots"><span class="dot" style="background:#ff5f57"></span><span class="dot" style="background:#febc2e"></span><span class="dot" style="background:#28c840"></span></div>
      <div class="addr"><svg class="lock" viewBox="0 0 24 24" fill="#5f6368"><path d="M12 1a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5zm3 8H9V6a3 3 0 0 1 6 0v3z"/></svg>google.com</div>
    </div>
    <div class="page">
      <div class="logo"><span class="b">G</span><span class="r">o</span><span class="y">o</span><span class="b">g</span><span class="g">l</span><span class="r">e</span></div>
      <div class="bar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#9aa0a6" stroke-width="2"/><line x1="16" y1="16" x2="21" y2="21" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="q">marketing digital perto de mim</span>
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z" fill="#4285F4"/><path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.9V21h2v-3.1A7 7 0 0 0 19 11h-2z" fill="#34A853"/><path d="M12 2a3 3 0 0 0-3 3v3h6V5a3 3 0 0 0-3-3z" fill="#FBBC05"/><path d="M9 8h6v3H9z" fill="#EA4335"/></svg>
      </div>
      <div class="btns"><div class="btn">Pesquisa Google</div><div class="btn">Estou com sorte</div></div>
    </div>
  </div>
</body></html>
