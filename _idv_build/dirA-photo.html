<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=block" rel="stylesheet">
<style>
  :root{--primary:#E8401F;--secondary:#6FB5AC;--cream:#F2EDE3;--cream-dim:rgba(242,237,227,.78);--cream-faint:rgba(242,237,227,.45);
    --fd:'Archivo',sans-serif;--fu:'Inter Tight',sans-serif;--fm:'JetBrains Mono',monospace;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#000;}
  .post{position:relative;width:1080px;height:1350px;overflow:hidden;font-family:var(--fu);color:var(--cream);}
  .bg{position:absolute;inset:0;}
  .bg img{width:100%;height:100%;object-fit:cover;display:block;}
  .shade{position:absolute;inset:0;background:linear-gradient(180deg, rgba(10,31,33,.62) 0%, rgba(10,31,33,.05) 26%, rgba(10,31,33,.20) 48%, rgba(10,31,33,.78) 74%, rgba(10,31,33,.96) 100%);}
  .content{position:absolute;inset:0;padding:64px 76px 56px;display:flex;flex-direction:column;z-index:2;}
  .top{display:flex;justify-content:space-between;align-items:center;}
  .eyebrow{font-family:var(--fm);font-size:15px;letter-spacing:.16em;text-transform:uppercase;color:var(--cream-dim);display:flex;align-items:center;gap:12px;}
  .eyebrow .dot{width:9px;height:9px;border-radius:50%;background:var(--secondary);}
  .handle{font-family:var(--fm);font-size:14px;letter-spacing:.16em;color:var(--cream-faint);}
  .spacer{flex:1 1 auto;}
  .pulse{width:300px;height:40px;margin-bottom:22px;}
  .pulse polyline{fill:none;stroke:var(--secondary);stroke-width:5;stroke-linejoin:round;stroke-linecap:round;}
  h1{font-family:var(--fd);font-weight:800;font-size:82px;line-height:.97;letter-spacing:-.02em;text-transform:uppercase;}
  h1 .accent{color:var(--secondary);}
  .sub{font-family:var(--fu);font-weight:400;font-size:25px;line-height:1.5;color:var(--cream-dim);margin-top:22px;max-width:820px;}
  .cta{align-self:flex-start;margin-top:34px;font-family:var(--fm);font-size:17px;letter-spacing:.1em;text-transform:uppercase;color:#FFF7EF;background:var(--primary);padding:21px 34px;border-radius:8px;display:inline-flex;gap:14px;align-items:center;}
  .foot{display:flex;justify-content:space-between;align-items:flex-end;padding-top:28px;margin-top:30px;border-top:1px solid rgba(242,237,227,.14);}
  .wordmark{font-family:var(--fd);font-weight:800;font-size:31px;letter-spacing:-.01em;}
  .wordmark .ia{color:var(--primary);}
  .tagline{font-family:var(--fm);font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--cream-faint);}
</style></head>
<body>
  <div class="post">
    <div class="bg"><img src="covers/photo-leads.png" alt=""></div>
    <div class="shade"></div>
    <div class="content">
      <div class="top"><div class="eyebrow"><span class="dot"></span>Tráfego pago • Qualificação</div><div class="handle">@marketeia</div></div>
      <div class="spacer"></div>
      <svg class="pulse" viewBox="0 0 300 40"><polyline points="0,28 120,28 150,8 178,34 206,12 232,28 300,28"/></svg>
      <h1>Como atingir <span class="accent">leads qualificados</span> com tráfego pago</h1>
      <p class="sub">Pare de pagar por curioso. Veja como mirar quem realmente compra.</p>
      <div class="cta">Material gratuito&nbsp;&nbsp;→&nbsp;&nbsp;link na bio</div>
      <div class="foot"><div class="wordmark">markete<span class="ia">ia</span></div><div class="tagline">Sinal vs ruído</div></div>
    </div>
  </div>
</body></html>
