<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=block" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#dcdcd6;width:1540px;height:760px;display:flex;gap:36px;padding:40px 40px 30px;font-family:'JetBrains Mono',monospace;}
  .col{flex:1;display:flex;flex-direction:column;}
  .label{font-size:18px;letter-spacing:.06em;color:#1a1a1a;margin-bottom:14px;display:flex;gap:10px;align-items:baseline;}
  .label b{color:#D03A1B;}
  .label span{font-size:13px;color:#666;}
  .frame{flex:1;border-radius:8px;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,.18);background:#000;}
  .frame img{width:100%;height:100%;object-fit:cover;display:block;}
</style></head>
<body>
  <div class="col"><div class="label"><b>A</b> Foto <span>· fundo escuro/foto</span></div><div class="frame"><img src="out-dirA.png"></div></div>
  <div class="col"><div class="label"><b>B</b> Sem imagem <span>· tipo + shape, claro</span></div><div class="frame"><img src="out-dirB.png"></div></div>
  <div class="col"><div class="label"><b>C</b> Clipping <span>· recorte + profundidade</span></div><div class="frame"><img src="out-dirC.png"></div></div>
</body></html>
