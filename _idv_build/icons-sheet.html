<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=block" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:1480px;height:520px;display:flex;gap:24px;padding:40px;font-family:'JetBrains Mono',monospace;
    background:linear-gradient(180deg,#0A1F21 0%,#0A1F21 58%,#F4F1E8 58%,#F4F1E8 100%);}
  .cell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
  .ico{height:300px;width:auto;filter:drop-shadow(0 18px 26px rgba(0,0,0,.35));}
  .lab{font-size:16px;letter-spacing:.06em;color:#122B2D;text-align:center;line-height:1.5;}
  .lab b{color:#D03A1B;display:block;font-size:18px;margin-bottom:2px;}
</style></head>
<body>
  <div class="cell"><img class="ico" src="covers/ic-trophy.png"><div class="lab"><b>TROFÉU</b>#8 · 1º no Google</div></div>
  <div class="cell"><img class="ico" src="covers/ic-rocket.png"><div class="lab"><b>FOGUETE</b>#7 · perfil Instagram</div></div>
  <div class="cell"><img class="ico" src="covers/ic-check.png"><div class="lab"><b>CHECK</b>#11 · validados</div></div>
  <div class="cell"><img class="ico" src="covers/ic-mag.png"><div class="lab"><b>LUPA</b>#12 · rede de busca</div></div>
</body></html>
